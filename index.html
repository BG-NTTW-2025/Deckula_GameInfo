<!-- ====================================================== -->
<!-- SECTION 1! - CSS                                       -->
<!-- ====================================================== -->

<style>

body
{

}

#ButtonBar

    position:fixed;

<script>

<!-- ====================================================== -->
<!-- SECTION 4! - FUNCTIONS                                 -->
<!-- ====================================================== -->

<script>

function JumpToCredits()
{

if(window.umami &&  TrackUmami)  // = TrackUmami == true. change const TrackUmami = true;
{
    umami.track("Credits");
}
    document
        .getElementById(
            "CreditSection"
        )
        .scrollIntoView(
            {
                behavior:"smooth"
            }
        );
}

function JumpToRules()
{
if(window.umami &&  TrackUmami)  // = TrackUmami == true. change const TrackUmami = true;
{
    umami.track("Rules");

    document
        .getElementById(
            "RulesSection"
        )
        .scrollIntoView(
            {
                behavior:"smooth"
            }
        );

{
if(window.umami &&  TrackUmami)  // = TrackUmami == true. change const TrackUmami = true;

function JumpToGallery()
{
if(window.umami &&  TrackUmami)  // = TrackUmami == true. change const TrackUmami = true;
{
    umami.track("Gallary");
}
    document
        .getElementById(
            "GallerySection"
        )
        .scrollIntoView(
            {
                behavior:"smooth"
            }
        );
}

function CreateGallery()
{
    let Gallery;
    let Card;
    let Nr;
    let Row;
    let Col;

    Gallery =
        document.getElementById(
            "GalleryContainer"
        );

    for(let i=0;i<25;i++)
    {
        Nr =
            String(i + 1)
            .padStart(2,"0");

        Row =
            Math.floor(i / 5);

        Col =
            i % 5;

        Card =
            document.createElement(
                "img"
            );

        Card.className =
            "SmallCard";

        Card.src =
            "https://bg-nttw-2025.github.io/Deckula/C"
            + Nr
            + ".gif";

        Card.style.left =
            (25 + Col * 80)
            + "px";

        Card.style.top =
            (45 + Row * 105)
            + "px";

        Card.dataset.card =
            Card.src;

        Card.addEventListener(
            "mouseenter",
            function()
        {
            document.getElementById(
                "BigCard"
            ).src =
                this.dataset.card;
        });

        Gallery.appendChild(
            Card
        );
    }

    for(let i=25;i<50;i++)
    {
        Nr =
            String(i + 1)
            .padStart(2,"0");

        Row =
            Math.floor(
                (i - 25) / 5
            );

        Col =
            (i - 25) % 5;

        Card =
            document.createElement(
                "img"
            );

        Card.className =
            "SmallCard";

        Card.src =
            "https://bg-nttw-2025.github.io/Deckula/C"
            + Nr
            + ".gif";

        Card.style.left =
            (815 + Col * 80)
            + "px";

        Card.style.top =
            (45 + Row * 105)
            + "px";

        Card.dataset.card =
            Card.src;

        Card.addEventListener(
            "mouseenter",
            function()
        {
            document.getElementById(
                "BigCard"
            ).src =
                this.dataset.card;
        });

        Gallery.appendChild(
            Card
        );
    }
}

</script>
